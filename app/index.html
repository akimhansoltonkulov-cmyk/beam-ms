<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/beam.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <!-- Status bar shares the app's light background (blends like Telegram/WhatsApp) -->
    <meta name="theme-color" content="#e9ebe4" />
    <meta name="description" content="Beam — an independent, next-generation messenger. Speed. Privacy. Transparency." />

    <!-- Standalone PWA — hides browser chrome when launched from the home screen -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Beam" />
    <link rel="apple-touch-icon" href="/beam.svg" />

    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Beam — Instant. Private. Transparent.</title>
    <script>
      // Re-assert the light status-bar color at runtime so Chrome versions that
      // honor dynamic theme-color update the installed-app status bar without a reinstall.
      (function () {
        var COLOR = '#e9ebe4'
        function apply() {
          var m = document.querySelector('meta[name="theme-color"]')
          if (!m) {
            m = document.createElement('meta')
            m.setAttribute('name', 'theme-color')
            document.head.appendChild(m)
          }
          // toggle to force a change event, then set the real value
          m.setAttribute('content', '#e9ebe5')
          requestAnimationFrame(function () { m.setAttribute('content', COLOR) })
        }
        apply()
        document.addEventListener('visibilitychange', function () {
          if (!document.hidden) apply()
        })
        window.addEventListener('pageshow', apply)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
